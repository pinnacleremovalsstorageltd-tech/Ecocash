{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Sign Up - EcoCash Partner Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <h1 class="h3 text-center mb-4">Partner Registration</h1>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control form-input" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control form-input" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text" name="first_name" class="form-control form-input" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Last Name</label>
                            <input type="text" name="last_name" class="form-control form-input" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" name="company_name" class="form-control form-input" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Business Registration Number</label>
                        <input type="text" name="business_registration_number" class="form-control form-input" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Business Type</label>
                        <input type="text" name="business_type" class="form-control form-input" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Contact Number</label>
                            <input type="tel" name="contact_number" class="form-control form-input" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Mobile Number</label>
                            <input type="tel" name="mobile_number" class="form-control form-input" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Position/Role</label>
                        <input type="text" name="position" class="form-control form-input" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Security Question</label>
                        <input type="text" name="security_question" class="form-control form-input" placeholder="e.g., What is your pet's name?" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Security Answer</label>
                        <input type="text" name="security_answer" class="form-control form-input" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password1" class="form-control form-input" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" name="password2" class="form-control form-input" required>
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="terms" class="form-check-input" id="terms" required>
                        <label class="form-check-label" for="terms">I agree to the terms and conditions</label>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
                    </div>
                </form>
                <hr>
                <p class="text-center">Already have an account? <a href="{% url 'accounts:login' %}" class="text-primary fw-bold">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
